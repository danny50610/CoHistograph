services:
  devcontainer:
    build:
      context: workspace
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached

  nginx:
    image: nginx:latest
    # Host ports come from .devcontainer/.env (see .env.example). Override per machine to avoid clashes.
    ports:
      - "127.0.0.1:${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ..:/workspace:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - devcontainer

  db:
    image: apache/age:release_PG15_1.5.0
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-54324}:5432"

  redis:
    image: redis:latest

volumes:
  postgres-data:
