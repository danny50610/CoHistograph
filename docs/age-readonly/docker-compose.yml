# Spins up PostgreSQL + Apache AGE for the read-only user investigation.
#   docker compose -f docs/age-readonly/docker-compose.yml up -d
services:
  age:
    image: apache/age:latest
    container_name: age-ro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: graphdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graphdb"]
      interval: 5s
      timeout: 5s
      retries: 10
